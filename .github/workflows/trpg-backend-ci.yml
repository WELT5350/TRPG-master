name: Backend CI

# 只在 trpg-backend/ 目录或本工作流文件自身变化时触发，其他目录（前端/SDK）
# 的改动不会跑这个 job，节省 CI 时间。
on:
  push:
    branches: [main]
    paths:
      - "trpg-backend/**"
      - ".github/workflows/trpg-backend-ci.yml"
  pull_request:
    paths:
      - "trpg-backend/**"
      - ".github/workflows/trpg-backend-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: trpg-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 官方 action：在 runner 上安装 uv 本身。
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "trpg-backend/uv.lock"

      # 读 .python-version 文件，装一个匹配的 Python 解释器。
      - name: Set up Python
        run: uv python install

      # --locked：严格按 uv.lock 里锁定的版本安装，如果 pyproject.toml 和
      # uv.lock 不一致（比如改了依赖忘记重新 lock）会直接报错，而不是静默
      # 装一个不一致的版本。
      - name: Install dependencies
        run: uv sync --locked

      - name: Lint with ruff
        run: uv run ruff check .

      - name: Check formatting with ruff
        run: uv run ruff format --check .

      - name: Type check with ty
        run: uv run ty check

      - name: Run tests
        run: uv run pytest
